name: "[Called] OPA Policy Evaluation"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: string
      working_directory:
        description: "Terraform folder path"
        required: false
        default: "."
        type: string
        
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      TF_API_TOKEN:
        required: true

permissions:
  actions: read
  contents: read

jobs:
  opa:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Artifact ko download karo (jo pehle kisi aur workflow ne upload kiya hoga)
      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-json-${{ inputs.environment }}
          path: .

      - name: Install Tools inside Container
        run: |
          apt-get update
          apt-get install -y curl jq unzip git

      - name: Install OPA inside Container
        run: |
          curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          mv opa /usr/local/bin/

      - name: Run OPA Evaluation
        run: |
          echo "===== OPA VERSION ====="
          opa version

          echo "===== POLICIES ====="
          find policies -type f

          echo "===== PACKAGES ====="
          grep -R "^package" policies || true

          echo "===== JSON VALIDATION ====="
          jq . tfplan.json > /dev/null
          echo "JSON OK"

          echo "===== RUNNING OPA ====="
          OPA_JSON=$(opa eval -f json -d policies -i tfplan.json "data")
          echo "$OPA_JSON" | jq '.'

          echo "# OPA Evaluation Results" >> $GITHUB_STEP_SUMMARY
          echo "### Scan Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target File:** tfplan.json" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$OPA_JSON" | jq '.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
