name: "docker-tflint"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        type: string

      working_directory:
        description: "Terraform folder path"
        required: false
        default: "."
        type: string

jobs:
  tflint:
    runs-on: self-hosted

    container:
      image: ghcr.io/terraform-linters/tflint:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Folder
        run: |
          echo "Scanning directory: ${{ inputs.working_directory }}"
          ls -R ${{ inputs.working_directory }}

      - name: TFLint Run
        run: |
          tflint \
            --chdir=${{ inputs.working_directory }} \
            --recursive \
            --format compact > tflint-report.txt || true

          echo "--- TFLint Summary ---"
          cat tflint-report.txt

      - name: Upload TFLint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tflint-report-${{ inputs.environment }}
          path: tflint-report.txt
          if-no-files-found: error
