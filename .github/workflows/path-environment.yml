name: "Infrastructure Pipeline"

on:
  workflow_call:
    inputs:
      target_env:
        required: false
        type: string
        default: ""
      working_dir:
        required: false
        type: string
        default: "."
      just_plan:
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  setup-env:
    name: "Setup & Validate"
    runs-on: [self-hosted, linux]
    outputs:
      resolved_env: ${{ steps.resolver.outputs.env }}
      resolved_dir: ${{ steps.resolver.outputs.dir }}
      skip_apply: ${{ steps.resolver.outputs.skip }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: resolver
        shell: bash
        run: |
          # --- 1. SET INPUTS ---
          ENV="${{ inputs.target_env }}"
          DIR="${{ inputs.working_dir }}"
          SKIP="${{ inputs.just_plan }}"
          BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | tr '[:upper:]' '[:lower:]')

          # --- 2. DEFAULT MAPPING (Agar ENV blank ho) ---
          if [[ -z "$ENV" ]]; then
            case "$BRANCH" in
              main)              ENV="production" ;;
              dev|develop)       ENV="development" ;;
              feat/*)            ENV="sit" ;;
            esac
          fi

          # --- 3. STRICT VALIDATION (Match nahi hua toh FAIL) ---
          VALID=false
          if [[ "$BRANCH" == "main" && "$ENV" == "production" ]]; then
            VALID=true
          elif [[ "$BRANCH" =~ ^(dev|develop)$ && "$ENV" == "development" ]]; then
            VALID=true
          elif [[ "$BRANCH" == feat/* && "$ENV" == "sit" ]]; then
            VALID=true
          fi

          if [[ "$VALID" == false ]]; then
            echo "::error::Invalid Environment/Branch combination: Branch '$BRANCH' cannot deploy to '$ENV'."
            exit 1
          fi
