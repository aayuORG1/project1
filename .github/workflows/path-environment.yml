name: "Infrastructure Pipeline"

on:
  workflow_call:
    inputs:
      target_env:
        required: false
        type: string
        default: ""
      working_dir:
        required: false
        type: string
        default: "."
      just_plan:
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  setup-env:
    name: "Setup & Validate"
    runs-on: [self-hosted, linux]
    outputs:
      resolved_env: ${{ steps.resolver.outputs.env }}
      resolved_dir: ${{ steps.resolver.outputs.dir }}
      skip_apply: ${{ steps.resolver.outputs.skip }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: resolver
        shell: bash
        run: |
          # --- 1. SET INPUTS ---
          ENV="${{ inputs.target_env }}"
          DIR="${{ inputs.working_dir }}"
          SKIP="${{ inputs.just_plan }}"

          if [[ -z "$ENV" ]]; then
            BRANCH=$(echo "${{ github.head_ref || github.ref_name }}" | tr '[:upper:]' '[:lower:]')
            case "$BRANCH" in
              main)               ENV="uat" ;;         # Main abhi UAT hai
              test|sit)           ENV="sit" ;;
              dev|develop|feat/*) ENV="development" ;;
              *) echo "::error::Unsupported branch: $BRANCH"; exit 1 ;;
            esac
          fi
          if [[ "$DIR" == "." ]]; then
            # Sirf 'child-modules/' folder ke andar ke changes dekho
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before || 'HEAD~1' }} ${{ github.sha }})          
            DIR=$(echo "$CHANGED_FILES" | grep '^child-modules/' | cut -d/ -f1-2 | head -n1)
            
            if [[ -z "$DIR" ]]; then
              echo "::error::No changes detected in child-modules/"
              exit 1
            fi
          fi         
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"          
          echo "Pipeline Ready -> ENV: $ENV | DIR: $DIR | SKIP: $SKIP"

  
