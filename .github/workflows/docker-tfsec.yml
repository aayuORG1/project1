name: "[Called] TFSec Security Scan"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target deployment environment"
        required: true
        type: string
      working_directory:
        description: "Terraform working directory"
        required: false
        default: "."
        type: string
    secrets:
      TF_API_TOKEN:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_CLIENT_ID:
        required: true
      ARM_TENANT_ID:
        required: true

jobs:
  tfsec:
    name: "TFSec Scan (${{ inputs.environment }})"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Debug Workspace
        run: |
          echo "Scanning directory: ${{ inputs.working_directory }}"
          ls -R "${{ inputs.working_directory }}"

      - name: Run TFSec Scan (Container)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/src \
            aquasec/tfsec:v1.28 \
            /src/${{ inputs.working_directory }} \
            --format json \
            --soft-fail \
            --out /tmp/tfsec-report.json


